app = "loopretto"

primary_region = "otp"  # Change to your closest region (e.g. iad, fra, lhr, etc.)

[build]
  # This section is not needed when using a Dockerfile, so it's left empty or omitted

[env]
  PORT = "5000"  # Flask's default

[experimental]
  auto_rollback = true

[[services]]
  internal_port = 5000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = 10000
    timeout = 2000
    grace_period = "10s"
    restart_limit = 0
