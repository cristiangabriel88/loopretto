<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Loopretto</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Sixtyfour+Convergence&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <script src="https://unpkg.com/wavesurfer.js@6"></script>
    <script src="https://unpkg.com/wavesurfer.js@6/dist/plugin/wavesurfer.timeline.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@6/dist/plugin/wavesurfer.regions.min.js"></script>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  </head>
  <body class="theme1 bg-gray-700 text-gray-900 select-none">
    <div class="container mx-auto p-8" id="mainContainer">
      <div class="relative">
        <div class="absolute top-0 right-0 -mt-6 ml-4">
          <details class="dropdown" id="dropdownMenu">
            <summary role="button">
              <svg
                class="button"
                xmlns="http://www.w3.org/2000/svg"
                width="40px"
                height="40px"
                viewBox="0 0 20 20"
                fill="none"
              >
                <path
                  fill="#000000"
                  fill-rule="evenodd"
                  d="M18 5a1 1 0 100-2H2a1 1 0 000 2h16zm-4 4a1 1 0 100-2H6a1 1 0 100 2h8zm5 3a1 1 0 01-1 1H2a1 1 0 110-2h16a1 1 0 011 1zm-5 5a1 1 0 100-2H6a1 1 0 100 2h8z"
                />
              </svg>
            </summary>
            <ul class="cursor-pointer">
              <li>
                <a href="#" id="theme-switcher" class="text-center"
                  >Background</a
                >
              </li>
              <li>
                <a href="#" id="zen-mode" class="text-center">Focus Mode</a>
              </li>
              <li><a href="howto" class="text-center">How to</a></li>
              <li><a href="about" class="text-center">About</a></li>
            </ul>
          </details>
        </div>

        <div class="flex justify-center items-center mt-10">
          <img
            src="static/images/loopretto-inline-transparent-logo.png"
            alt="Audio Wave Icon"
            class="mr-4"
            id="headerIcon"
          />
        </div>
      </div>

      <div id="loading-zone">
        <input
          type="text"
          id="youtube-url"
          class="w-1/3 p-2 mb-4 mt-20 border border-gray-300 rounded-lg"
          placeholder="https://www.youtube.com/watch?v=gCARYHv6sdY"
          value="https://www.youtube.com/watch?v=gCARYHv6sdY"
        />
        <div class="flex justify-between items-center w-full">
          <button
            id="load-audio"
            class="text-white px-4 py-2 mt-2 rounded-lg hover:bg-blue-600"
          >
            Load Audio
          </button>

          <div
            id="loading-indicator"
            class="loader ml-[80px] mt-4"
            style="display: none"
          ></div>
        </div>
      </div>
      <div
        id="thumb-and-title-zone"
        class="flex justify-between items-center w-full mt-8"
      >
        <div id="thumb-and-title-left" class="flex items-center">
          <img
            id="video-thumbnail"
            src=""
            alt="Video Thumbnail"
            class="block max-w-[141px] mr-4"
          />
          <h2 id="video-title" class="text-xxl font-semibold"></h2>
        </div>

        <div class="flex space-x-2">
          <button
            id="addNewAudioButton"
            class="text-white px-4 py-2 rounded-lg flex items-center"
            title="Add different song"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="60px"
              height="60px"
              viewBox="0 0 24 24"
              fill="none"
              id="addnewAudioSVG"
              class="SVGButton"
            >

                fill="#000000"
              />
            </svg>
          </button>

          <button
            id="downloadAudioButton"
            class="text-white py-2 rounded-lg flex items-center"
            title="Download mp3"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="60px"
              height="60px"
              viewBox="0 0 24 24"
              fill="none"
              id="downloadAudioSVG"
              class="SVGButton"
            >
              <path

                fill="#000000"
              />
            </svg>
          </button>
        </div>
      </div>

      <div id="waveform" class="mt-8 bg-gray-200 rounded-lg">
        <div id="wave-timeline" class="mt-8"></div>
      </div>

      <div id="controls" class="mt-4 flex space-x-8 items-center">
        <button
          id="play-pause"
          class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600"
        >
          <svg
            id="playButton"
            class="show mx-2 my-2"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            fill="#1e5026"

            xmlns:xlink="http://www.w3.org/1999/xlink"
            fill="#664109"
            height="60px"
            width="60px"
            version="1.1"
            id="Capa_1"
            viewBox="0 0 512 512"
            xml:space="preserve"
          >

            />
          </svg>
        </button>
        <button
          id="loop"
          class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600"
        >
          Loop Section
        </button>

        <!--! Speed Controls-->
        <div
          id="speed-control"
          class="flex justify-center items-center space-x-4"
        >
          <span class="text-white">Speed</span>
          <button id="decrease-speed" class="speedButton text-white rounded-lg">
            -
          </button>
          <div id="speed-display" class="text-white text-lg w-16 text-center">
            100%
          </div>
          <button id="increase-speed" class="speedButton text-white rounded-lg">
            +
          </button>
        </div>

        <!--!Zoom Controls  -->
        <div id="zoom-control" class="flex items-center space-x-4">
          <label for="zoom-range" class="text-white">Zoom</label>
          <input
            id="zoom-range"
            type="range"
            min="0"
            max="100"
            value="0"
            class="slider"
            disabled
          />
          <div id="zoom-display" class="text-white text-lg">0%</div>
        </div>
        <!-- ! Pitch Controls -->
        <div
          id="pitch-control"
          class="flex justify-center items-center space-x-4"
        >
          <span class="text-white">Pitch</span>
          <button id="decrease-pitch" class="speedButton text-white rounded-lg">
            -
          </button>
          <div id="pitch-display" class="text-white text-lg">0 st</div>
          <button id="increase-pitch" class="speedButton text-white rounded-lg">
            +
          </button>
        </div>

        <!-- ! PIANO -->
        <div class="ml-auto cursor-default">
          <button
            id="showPianoButton"
            class="text-white py-2 rounded-lg cursor-default"
            title="Show piano"

      </div>
      <div
        id="piano-body"
        class="flex justify-center items-center min-h-screen"
        hidden
      >
        <div class="piano">
          <div data-note="C" class="key white"></div>
          <div data-note="Db" class="key black"></div>
          <div data-note="D" class="key white"></div>
          <div data-note="Eb" class="key black"></div>
          <div data-note="E" class="key white"></div>
          <div data-note="F" class="key white"></div>
          <div data-note="Gb" class="key black"></div>
          <div data-note="G" class="key white"></div>
          <div data-note="Ab" class="key black"></div>
          <div data-note="A" class="key white"></div>
          <div data-note="Bb" class="key black"></div>
          <div data-note="B" class="key white"></div>
        </div>

        <audio id="C" src="./static/piano/C.mp3"></audio>
        <audio id="Db" src="./static/piano/Db.mp3"></audio>
        <audio id="D" src="./static/piano/D.mp3"></audio>
        <audio id="Eb" src="./static/piano/Eb.mp3"></audio>
        <audio id="E" src="./static/piano/E.mp3"></audio>
        <audio id="F" src="./static/piano/F.mp3"></audio>
        <audio id="Gb" src="./static/piano/Gb.mp3"></audio>
        <audio id="G" src="./static/piano/G.mp3"></audio>
        <audio id="Ab" src="./static/piano/Ab.mp3"></audio>
        <audio id="A" src="./static/piano/A.mp3"></audio>
        <audio id="Bb" src="./static/piano/Bb.mp3"></audio>
        <audio id="B" src="./static/piano/B.mp3"></audio>
      </div>
    </div>
